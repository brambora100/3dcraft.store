<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3DCRAFT OS | Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #6366f1; --bg: #f8fafc; --card: #ffffff; 
            --text-main: #0f172a; --text-muted: #64748b; --border: #e2e8f0; 
            --radius-lg: 24px; --radius-md: 14px; --danger: #ef4444; 
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding-bottom: 60px; }
        .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }
        .hidden { display: none !important; }
        
        /* UI PRVKY */
        .header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 25px 40px; border-radius: var(--radius-lg); box-shadow: var(--shadow); margin-bottom: 30px; }
        .nav-tabs { display: flex; gap: 12px; }
        .tab-btn { padding: 14px 28px; border-radius: var(--radius-md); border: none; background: #f1f5f9; cursor: pointer; font-weight: 700; color: var(--text-muted); transition: 0.2s; }
        .tab-btn.active { background: var(--primary); color: white; }

        /* MODAL */
        .modal { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; border-radius: 32px; width: 95%; max-width: 850px; max-height: 90vh; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 30px 60px -12px rgba(0,0,0,0.4); }
        .modal-header { padding: 30px 45px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 35px 45px; overflow-y: auto; flex-grow: 1; }

        /* SECTIONS (ACCORDION) */
        .section-box { border: 1px solid var(--border); border-radius: 20px; margin-bottom: 20px; overflow: hidden; background: #ffffff; }
        .section-header { padding: 22px 30px; background: #fcfcfd; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 800; color: var(--text-main); font-size: 1.05rem; }
        .section-content { padding: 30px; display: none; border-top: 1px solid var(--border); }
        .section-box.open .section-content { display: block; }

        /* INPUTS */
        label { display: block; font-size: 0.75rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; }
        input, select, textarea { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--border); background: #f8fafc; font-family: inherit; font-size: 1rem; box-sizing: border-box; margin-bottom: 20px; }
        input:focus { border-color: var(--primary); outline: none; background: white; }
        
        /* TABLE */
        table { width: 100%; border-collapse: collapse; background: white; border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow); }
        th { text-align: left; padding: 22px 30px; font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); border-bottom: 1px solid var(--border); }
        td { padding: 22px 30px; border-bottom: 1px solid #f1f5f9; cursor: pointer; }
        tr:hover { background: #f5f3ff; }

        .btn { padding: 16px 35px; border-radius: 16px; border: none; font-weight: 800; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-mail { width: 100%; padding: 18px; border-radius: 14px; border: 1px solid var(--border); background: white; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 15px; margin-bottom: 10px; transition: 0.2s; }
        .btn-mail:hover { border-color: var(--primary); color: var(--primary); }

        .modal-footer { padding: 25px 45px; background: #fcfcfd; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        
        /* ARES HINTS */
        #ares-results { position: absolute; background: white; border: 1px solid var(--border); border-radius: 12px; width: 100%; z-index: 100; box-shadow: var(--shadow); max-height: 200px; overflow-y: auto; margin-top: -15px; }
        .ares-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; }
        .ares-item:hover { background: #f0f4ff; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 style="margin:0; font-weight: 800;">3D<span style="color:var(--primary)">CRAFT</span> OS</h1>
        <div class="nav-tabs">
            <button class="tab-btn active" id="tab-btn-orders" onclick="switchTab('orders')">Seznam zakázek</button>
            <button class="tab-btn" id="tab-btn-new" onclick="switchTab('new')">+ Nová objednávka</button>
        </div>
    </div>

    <!-- TAB: SEZNAM -->
    <div id="tab-orders">
        <input type="text" id="order-search" placeholder="Hledat zakázku..." oninput="renderTable()" style="margin-bottom: 20px;">
        <table>
            <thead><tr><th>Projekt</th><th>Zákazník</th><th>Stav</th><th align="right">Cena</th></tr></thead>
            <tbody id="orders-table"></tbody>
        </table>
    </div>

    <!-- TAB: NOVÁ OBJEDNÁVKA -->
    <div id="tab-new" class="hidden">
        <div class="section-box open" style="max-width: 800px; margin: 0 auto; box-shadow: var(--shadow);">
            <div class="section-header">🆕 ZALOŽENÍ NOVÉ OBJEDNÁVKY</div>
            <div class="section-content">
                <div style="position:relative">
                    <label>Hledat firmu (ARES)</label>
                    <input type="text" id="ares-search-name" placeholder="Název nebo IČO...">
                    <div id="ares-results" class="hidden"></div>
                </div>

                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                    <div><label>Jméno / Firma</label><input type="text" id="cust-name"></div>
                    <div><label>E-mail</label><input type="email" id="cust-email"></div>
                </div>

                <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:15px;">
                    <div><label>IČO</label><input type="text" id="cust-ico"></div>
                    <div><label>DIČ</label><input type="text" id="cust-dic"></div>
                    <div><label>Telefon</label><input type="text" id="cust-phone"></div>
                </div>

                <div style="display:grid; grid-template-columns: 2fr 1fr 1fr; gap:15px;">
                    <div><label>Ulice</label><input type="text" id="cust-address"></div>
                    <div><label>Město</label><input type="text" id="cust-city"></div>
                    <div><label>PSČ</label><input type="text" id="cust-psc"></div>
                </div>

                <hr style="margin: 20px 0; border:0; border-top: 1px solid var(--border);">

                <div style="display:grid; grid-template-columns: 2fr 1fr; gap:15px;">
                    <div>
                        <label>Projekt (Odkaz např. Thingiverse)</label>
                        <input type="text" id="proj-link" placeholder="https://www.thingiverse.com/thing:...">
                        <input type="text" id="proj-name" placeholder="Název zakázky">
                    </div>
                    <div>
                        <label>Materiál</label>
                        <select id="mat-select" onchange="recalc()"><option>PLA</option><option>PETG</option><option>ABS</option><option>ASA</option></select>
                    </div>
                </div>

                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                    <div><label>Váha (g)</label><input type="number" id="weight-input" oninput="recalc()" value="0"></div>
                    <div><label>Množství (ks)</label><input type="number" id="pcs-input" oninput="recalc()" value="1"></div>
                </div>

                <div style="background: #f1f5f9; padding: 25px; border-radius: 12px; margin-bottom: 20px; text-align: center;">
                    <div style="font-size: 1.8rem; font-weight: 900;" id="final-price-display">0 Kč</div>
                    <div id="base-price-info" style="font-size: 0.8rem; color: var(--text-muted);">Čistá cena bez dopravy</div>
                </div>

                <button class="btn btn-primary" style="width:100%" onclick="saveOrder()">VYTVOŘIT A ULOŽIT</button>
            </div>
        </div>
    </div>
</div>

<!-- DETAIL MODAL -->
<div id="detail-modal" class="modal hidden">
    <div class="modal-content">
        <div class="modal-header">
            <div>
                <h2 id="det-header-title" style="margin:0; font-weight: 800;">Detail</h2>
                <small id="det-order-id-label" style="color:var(--text-muted)"></small>
            </div>
            <button onclick="closeModal()" style="border:none; background:#f1f5f9; width:45px; height:45px; border-radius:50%; cursor:pointer;">✕</button>
        </div>

        <div class="modal-body">
            <!-- SEKCE 1: PRODUKT -->
            <div class="section-box open">
                <div class="section-header" onclick="toggleSection(this)">📦 VÝROBA & PRODUKT <span>▼</span></div>
                <div class="section-content">
                    <div style="display:grid; grid-template-columns: 2fr 1fr; gap:15px;">
                        <div><label>Název projektu</label><input type="text" id="det-proj-name"></div>
                        <div><label>Stav</label>
                            <select id="det-stav" style="font-weight:bold; color:var(--primary);">
                                <option value="Nová">Nová</option>
                                <option value="Čeká na platbu">Čeká na platbu</option>
                                <option value="V tisku">V tisku</option>
                                <option value="Odesláno">Odesláno</option>
                            </select>
                        </div>
                    </div>
                    <label>Odkaz na model</label>
                    <input type="text" id="det-proj-link">
                    
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                        <div><label>Materiál</label><select id="det-material"><option>PLA</option><option>PETG</option><option>ABS</option><option>ASA</option></select></div>
                        <div><label>Barva</label><input type="text" id="det-color"></div>
                    </div>
                    <label>Cena tisku (bez dopravy)</label>
                    <input type="number" id="det-price-tisk">
                    <label>Interní poznámka</label>
                    <textarea id="det-note" rows="2"></textarea>
                </div>
            </div>

            <!-- SEKCE 2: ZÁKAZNÍK & DOPRAVA -->
            <div class="section-box">
                <div class="section-header" onclick="toggleSection(this)">👤 ZÁKAZNÍK & DOPRAVA <span>▼</span></div>
                <div class="section-content">
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                        <div><label>Jméno / Firma</label><input type="text" id="det-cust-name"></div>
                        <div><label>E-mail</label><input type="email" id="det-email"></div>
                    </div>
                    <label>Fakturační adresa</label>
                    <textarea id="det-full-address" rows="2"></textarea>

                    <div style="background: #fff1f2; padding: 25px; border-radius: 20px; border: 1px solid #fecdd3; margin-top: 10px;">
                        <label style="color:#e11d48">Doručení: Balíkovna</label>
                        <div id="det-ship-address" style="font-weight:800; margin-bottom:15px; color:#475569;">Nevybráno</div>
                        <button class="btn btn-primary" style="background:#e11d48; width:100%;" onclick="toggleBalikovna()">VYBRAT POBOČKU</button>
                        <iframe id="balikovna-iframe" src="https://b2c.cpost.cz/locations/?type=BALIKOVNY" style="display:none; width:100%; height:350px; border:1px solid #ddd; margin-top:15px; border-radius:12px;"></iframe>
                    </div>
                </div>
            </div>

            <!-- SEKCE 3: E-MAILY -->
            <div class="section-box">
                <div class="section-header" onclick="toggleSection(this)">📧 ODESLAT E-MAIL <span>▼</span></div>
                <div class="section-content">
                    <button class="btn-mail" onclick="sendWorkerEmail('naceneni')">💰 Poslat cenovou nabídku</button>
                    <button class="btn-mail" onclick="sendWorkerEmail('platba')">💳 Poslat podklady k platbě</button>
                    <button class="btn-mail" onclick="sendWorkerEmail('tisk')">🚀 Info: Začínáme tisknout</button>
                    <button class="btn-mail" onclick="sendWorkerEmail('odeslano')">📦 Info: Odesláno</button>
                    
                    <div style="margin-top:15px;">
                        <label>Příloha k e-mailu (např. faktura PDF)</label>
                        <input type="file" id="det-pdf-file" onchange="updatePdfName(this)">
                        <small id="pdf-file-name" style="color:green; font-weight:700;"></small>
                    </div>
                </div>
            </div>
        </div>

        <div class="modal-footer">
            <button class="btn" style="background:#fee2e2; color:var(--danger)" id="del-det-btn">SMAZAT</button>
            <div style="text-align: right;">
                <div id="det-shipping-summary" style="font-weight:800; margin-bottom:5px; font-size:0.9rem;"></div>
                <button class="btn btn-primary" id="save-det-btn" style="min-width: 200px;">ULOŽIT VŠE</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyBrbJDCJkFm7lD2XOH7-TZmyFRqAUFdQkY", 
        authDomain: "dcraft-748f9.firebaseapp.com", 
        projectId: "dcraft-748f9", 
        appId: "1:761752992060:web:b84c4687cc3dff6afb8639" 
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const WORKER_URL = "https://emailoveakce.bilcusadam.workers.dev/";

    let allOrders = [];
    let activeId = null;
    let currentDopravaCena = 0;

    signInAnonymously(auth);

    window.toggleSection = (el) => el.parentElement.classList.toggle('open');
    window.switchTab = (t) => {
        document.getElementById('tab-orders').classList.toggle('hidden', t!=='orders');
        document.getElementById('tab-new').classList.toggle('hidden', t!=='new');
        document.getElementById('tab-btn-orders').classList.toggle('active', t==='orders');
        document.getElementById('tab-btn-new').classList.toggle('active', t==='new');
    };

    // ARES LOGIKA
    const aresSearchInput = document.getElementById('ares-search-name');
    const aresResultsDiv = document.getElementById('ares-results');

    aresSearchInput.addEventListener('input', async (e) => {
        const val = e.target.value;
        if (val.length < 3) { aresResultsDiv.classList.add('hidden'); return; }
        try {
            const res = await fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: "ares_proxy", ico: val })
            });
            const data = await res.json();
            const firmy = data.ekonomickeSubjekty || [];
            if (firmy.length > 0) {
                aresResultsDiv.innerHTML = firmy.map(f => `
                    <div class="ares-item" onclick="selectAresCompany('${f.ico}', '${f.obchodniJmeno.replace(/'/g, "\\'")}')">
                        <b>IČO: ${f.ico}</b> ${f.obchodniJmeno}
                    </div>
                `).join('');
                aresResultsDiv.classList.remove('hidden');
            }
        } catch (e) { console.error("ARES error", e); }
    });

    window.selectAresCompany = async (ico, jmeno) => {
        aresResultsDiv.classList.add('hidden');
        aresSearchInput.value = jmeno;
        try {
            const res = await fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: "ares_proxy", ico: ico })
            });
            const data = await res.json();
            const d = data.ekonomickeSubjekty ? data.ekonomickeSubjekty[0] : data;
            document.getElementById('cust-name').value = d.obchodniJmeno || "";
            document.getElementById('cust-ico').value = d.ico || "";
            document.getElementById('cust-dic').value = d.dic || "";
            if (d.sidlo) {
                document.getElementById('cust-address').value = `${d.sidlo.nazevUlice || d.sidlo.nazevObce} ${d.sidlo.cisloDomovni || ""}`;
                document.getElementById('cust-city').value = d.sidlo.nazevObce || "";
                document.getElementById('cust-psc').value = d.sidlo.psc || "";
            }
        } catch(e) { console.log("ARES detail error", e); }
    };

    // VÝPOČET CENY
    window.recalc = () => {
        const mat = document.getElementById('mat-select').value;
        const weight = parseFloat(document.getElementById('weight-input').value) || 0;
        const pcs = parseInt(document.getElementById('pcs-input').value) || 1;
        const rates = { PLA: 2.2, PETG: 2.8, ABS: 4.0, ASA: 4.5 };
        let tiskBase = Math.round((60 + (weight * rates[mat])) * pcs);
        document.getElementById('final-price-display').innerText = tiskBase + " Kč";
        document.getElementById('base-price-info').innerText = `Čistá cena: ${tiskBase} Kč`;
    };

    // FIREBASE OPERACE
    window.saveOrder = async () => {
        const name = document.getElementById('proj-name').value;
        const link = document.getElementById('proj-link').value;
        const tiskCena = parseInt(document.getElementById('final-price-display').innerText);
        if(!name) return alert("Zadejte název!");
        await addDoc(collection(db, "objednavky"), {
            nazev: name, link: link, zakaznik: document.getElementById('cust-name').value,
            email: document.getElementById('cust-email').value, phone: document.getElementById('cust-phone').value,
            cena: tiskCena, cena_tisku: tiskCena, doprava_cena: 0, material: document.getElementById('mat-select').value,
            stav: "nová", shipAddress: "", ico: document.getElementById('cust-ico').value, dic: document.getElementById('cust-dic').value,
            fakturacniAdresa: `${document.getElementById('cust-address').value}, ${document.getElementById('cust-city').value} ${document.getElementById('cust-psc').value}`,
            poznamka: `Množství: ${document.getElementById('pcs-input').value} ks`, datum: serverTimestamp()
        });
        switchTab('orders');
    };

    onSnapshot(query(collection(db, "objednavky"), orderBy("datum", "desc")), s => {
        allOrders = s.docs.map(d => ({ id: d.id, ...d.data() }));
        renderTable();
    });

    window.renderTable = () => {
        const q = document.getElementById('order-search').value.toLowerCase();
        const tbody = document.getElementById('orders-table');
        tbody.innerHTML = '';
        allOrders.filter(o => (o.nazev + (o.zakaznik||'')).toLowerCase().includes(q)).forEach(o => {
            const tr = document.createElement('tr');
            tr.onclick = () => openDetail(o);
            tr.innerHTML = `<td><strong>${o.nazev}</strong></td><td>${o.zakaznik || 'Neznámý'}</td><td><span style="color:var(--primary)">${o.stav}</span></td><td align="right"><b>${o.cena || 0} Kč</b></td>`;
            tbody.appendChild(tr);
        });
    };

    window.openDetail = (o) => {
        activeId = o.id;
        currentDopravaCena = o.doprava_cena || 0;
        document.getElementById('det-header-title').innerText = o.nazev;
        document.getElementById('det-order-id-label').innerText = o.id;
        document.getElementById('det-proj-name').value = o.nazev;
        document.getElementById('det-proj-link').value = o.link || "";
        document.getElementById('det-stav').value = o.stav;
        document.getElementById('det-price-tisk').value = o.cena_tisku || o.cena;
        document.getElementById('det-material').value = o.material || "PLA";
        document.getElementById('det-color').value = o.barva || "";
        document.getElementById('det-note').value = o.poznamka || "";
        document.getElementById('det-cust-name').value = o.zakaznik || "";
        document.getElementById('det-email').value = o.email || "";
        document.getElementById('det-full-address').value = o.fakturacniAdresa || "";
        document.getElementById('det-ship-address').innerText = o.shipAddress || "Doprava nevybrána";
        document.getElementById('det-shipping-summary').innerText = `Doprava: ${currentDopravaCena} Kč | Celkem: ${(o.cena_tisku || o.cena) + currentDopravaCena} Kč`;
        document.getElementById('detail-modal').classList.remove('hidden');
    };

    window.toggleBalikovna = () => {
        const frame = document.getElementById('balikovna-iframe');
        frame.style.display = frame.style.display === 'none' ? 'block' : 'none';
    };

    window.addEventListener('message', async (e) => {
        if (e.data.message === 'pickerResult') {
            const addr = `Balíkovna: ${e.data.point.name}, ${e.data.point.address}, PSČ: ${e.data.point.zip}`;
            document.getElementById('det-ship-address').innerText = addr;
            document.getElementById('balikovna-iframe').style.display = 'none';
            if (activeId) await updateDoc(doc(db, "objednavky", activeId), { shipAddress: addr, doprava_cena: 79 });
        }
    });

    window.sendWorkerEmail = async (type) => {
        const btn = event.target;
        const email = document.getElementById('det-email').value;
        const tiskCena = parseInt(document.getElementById('det-price-tisk').value);
        if(!email) return alert("Chybí e-mail!");
        
        btn.innerText = "⏳...";
        let attachments = [];
        if(type === 'platba' && document.getElementById('det-pdf-file').files[0]) {
            const base64 = await toBase64(document.getElementById('det-pdf-file').files[0]);
            attachments.push({ content: base64.split(',')[1], filename: document.getElementById('det-pdf-file').files[0].name });
        }

        try {
            await fetch(WORKER_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    action: "send_specific_mail", mailType: type, email: email,
                    nazev: document.getElementById('det-proj-name').value,
                    total: tiskCena + currentDopravaCena, orderId: activeId,
                    shipAddress: document.getElementById('det-ship-address').innerText,
                    attachments: attachments
                })
            });
            alert("E-mail odeslán!");
        } catch (e) { alert("Chyba!"); }
        btn.innerText = "Odesláno ✅";
    };

    const toBase64 = f => new Promise((res, rej) => {
        const r = new FileReader(); r.readAsDataURL(f);
        r.onload = () => res(r.result); r.onerror = e => rej(e);
    });

    window.closeModal = () => document.getElementById('detail-modal').classList.add('hidden');
    window.updatePdfName = (i) => document.getElementById('pdf-file-name').innerText = i.files[0] ? "✅ " + i.files[0].name : "";

    document.getElementById('save-det-btn').onclick = async () => {
        const tiskCena = parseInt(document.getElementById('det-price-tisk').value);
        await updateDoc(doc(db, "objednavky", activeId), {
            stav: document.getElementById('det-stav').value, nazev: document.getElementById('det-proj-name').value,
            link: document.getElementById('det-proj-link').value,
            cena_tisku: tiskCena, cena: tiskCena + currentDopravaCena,
            zakaznik: document.getElementById('det-cust-name').value, email: document.getElementById('det-email').value,
            material: document.getElementById('det-material').value, barva: document.getElementById('det-color').value,
            poznamka: document.getElementById('det-note').value, fakturacniAdresa: document.getElementById('det-full-address').value
        });
        closeModal();
    };

    document.getElementById('del-det-btn').onclick = async () => {
        if(confirm("Smazat?")) { await deleteDoc(doc(db, "objednavky", activeId)); closeModal(); }
    };
</script>
</body>
</html>
