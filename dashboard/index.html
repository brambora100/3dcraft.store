<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D-Craft OS | Search Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/STLLoader.js"></script>

    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --muted: #64748b; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .hidden { display: none !important; }
        
        /* UI KARTY */
        .card { background: var(--card); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); padding: 25px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 12px 20px; border-radius: 12px; border: none; background: #e2e8f0; cursor: pointer; font-weight: 700; color: #64748b; }
        .tab-btn.active { background: var(--primary); color: white; }

        /* VYHLEDÁVÁNÍ */
        .search-container { position: relative; margin-bottom: 15px; }
        .search-input { width: 100%; padding: 15px 20px; border-radius: 15px; border: 2px solid #e2e8f0; font-size: 1rem; font-family: inherit; font-weight: 600; box-sizing: border-box; transition: 0.3s; }
        .search-input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); }

        /* FORMULÁŘE */
        label { display: block; font-size: 0.8rem; font-weight: 700; margin: 15px 0 5px; color: #64748b; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #f1f5f9; font-size: 1rem; box-sizing: border-box; }
        
        .btn-main { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: 700; font-size: 1rem; cursor: pointer; margin-top: 20px; }
        .btn-calc { width:100%; padding:15px; border: 2px dashed #cbd5e1; border-radius:10px; cursor:pointer; background:none; font-weight:700; color:var(--primary); }

        /* TABULKA */
        table { width: 100%; border-collapse: collapse; }
        tr.order-row { cursor: pointer; border-bottom: 1px solid #f1f5f9; transition: 0.2s; }
        tr.order-row:hover { background: #f8fafc; transform: translateX(5px); }
        td { padding: 15px 10px; }

        .pill { padding: 5px 10px; border-radius: 8px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; }
        .s-nová { background: #e0e7ff; color: #4338ca; }
        .s-tiskne { background: #fef3c7; color: #92400e; }
        .s-hotovo { background: #dcfce7; color: #166534; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .modal-content { background: white; border-radius: 20px; padding: 30px; width: 100%; max-width: 800px; max-height: 90vh; overflow-y: auto; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-section" class="card" style="max-width: 400px; margin: 100px auto; text-align: center;">
        <h1 style="margin-bottom: 30px;">D-CRAFT<span style="color:var(--primary)">.OS</span></h1>
        <input type="email" id="login-email" placeholder="E-mail">
        <input type="password" id="login-password" placeholder="Heslo" style="margin-top:10px;">
        <button id="login-btn" class="btn-main">Vstoupit</button>
    </div>

    <div id="dashboard-section" class="hidden">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="font-weight: 800;">D-Craft Administrace</h2>
            <button id="logout-btn" style="background:none; border:none; color:var(--muted); cursor:pointer;">Odhlásit se</button>
        </div>

        <div class="nav-tabs">
            <button class="tab-btn active" id="btn-tab-orders" onclick="switchTab('orders')">📦 Seznam zakázek</button>
            <button class="tab-btn" id="btn-tab-new" onclick="switchTab('new')">➕ Nová zakázka</button>
        </div>

        <div id="tab-orders">
            <div class="search-container">
                <input type="text" id="order-search" class="search-input" placeholder="🔍 Hledat model, klienta nebo barvu..." oninput="renderTable()">
                <div id="search-count" style="font-size: 0.75rem; color: var(--muted); margin-top: 8px; font-weight: 600; padding-left: 5px;"></div>
            </div>
            <div class="card">
                <table>
                    <thead><tr style="text-align:left; color:var(--muted); font-size:0.8rem;"><th>NÁZEV MODELU</th><th>KLIENT</th><th>BARVA</th><th>MATERIÁL</th><th>STAV</th><th>CENA</th></tr></thead>
                    <tbody id="orders-table"></tbody>
                </table>
            </div>
        </div>

        <div id="tab-new" class="hidden">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:25px;">
                <div class="card">
                    <h3>1. Kalkulace</h3>
                    <button id="btn-calc-trigger" class="btn-calc">📁 Vložit .STL pro výpočet ceny</button>
                    <input type="file" id="stl-file" class="hidden" accept=".stl">
                    <div id="file-status" style="margin-top:10px; font-weight:700; color:var(--primary);" class="hidden"></div>
                    
                    <label>Odkaz na Printables/Thingiverse *</label>
                    <input type="url" id="order-link" placeholder="https://...">
                    
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                        <div>
                            <label>Materiál</label>
                            <select id="order-material" onchange="recalculatePrice()">
                                <option>PLA</option><option>ABS</option><option>PETG</option>
                            </select>
                        </div>
                        <div><label>Barva *</label><input type="text" id="order-color" placeholder="Černá, Bílá..."></div>
                    </div>
                    
                    <label>Název projektu</label><input type="text" id="order-name">
                    <label>Cena (Kč)</label><input type="number" id="order-price" style="font-size:1.5rem; font-weight:800; color:var(--primary);">
                </div>

                <div class="card">
                    <h3>2. Zákazník</h3>
                    <label>Jméno</label><input type="text" id="cust-name">
                    <label>Firma</label><input type="text" id="cust-firm" oninput="checkFirm()">
                    <div id="firm-box" class="hidden" style="background:#fef2f2; padding:15px; border-radius:12px; margin-top:10px; border:1px solid #fecaca;">
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                            <div><label>IČO</label><input type="text" id="cust-ico"></div>
                            <div><label>DIČ</label><input type="text" id="cust-dic"></div>
                        </div>
                    </div>
                    <label>Telefon</label><input type="text" id="cust-phone">
                    <label>E-mail</label><input type="text" id="cust-email">
                    <button id="add-btn" class="btn-main">Vytvořit zakázku</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="detail-modal" class="modal hidden">
    <div class="modal-content">
        <h2 id="modal-title" style="margin-top:0;">Detail zakázky</h2>
        <div id="modal-link-box" style="padding:15px; background:#f1f5f9; border-radius:12px; margin-bottom:20px; text-align:center;"></div>
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
            <div>
                <label>Stav</label><select id="edit-stav"><option value="nová">NOVÁ</option><option value="tiskne">TISKNE</option><option value="hotovo">HOTOVO</option></select>
                <label>Název</label><input type="text" id="edit-nazev">
                <label>Cena (Kč)</label><input type="number" id="edit-cena">
                <label>Barva</label><input type="text" id="edit-barva">
            </div>
            <div>
                <label>Zákazník</label><input type="text" id="edit-zakaznik">
                <label>Firma</label><input type="text" id="edit-firma">
                <label>E-mail</label><input type="text" id="edit-email">
                <label>Telefon</label><input type="text" id="edit-tel">
            </div>
        </div>
        <div style="margin-top:30px; display:flex; gap:10px;">
            <button id="save-edit" class="btn-main" style="margin:0;">Uložit změny</button>
            <button id="del-order" style="background:#fee2e2; color:red; border:none; padding:15px; border-radius:12px; font-weight:700; cursor:pointer;">Smazat</button>
            <button onclick="closeModal()" style="background:none; border:none; cursor:pointer; color:var(--muted); font-weight:700;">Zavřít</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBrbJDCJkFm7lD2XOH7-TZmyFRqAUFdQkY",
        authDomain: "dcraft-748f9.firebaseapp.com",
        projectId: "dcraft-748f9",
        storageBucket: "dcraft-748f9.appspot.com",
        appId: "1:761752992060:web:b84c4687cc3dff6afb8639"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const loader = new THREE.STLLoader();

    let allOrders = [];
    let currentId = null;
    let lastWeight = 0;

    window.switchTab = (t) => {
        document.getElementById('tab-orders').classList.toggle('hidden', t!=='orders');
        document.getElementById('tab-new').classList.toggle('hidden', t!=='new');
        document.getElementById('btn-tab-orders').classList.toggle('active', t==='orders');
        document.getElementById('btn-tab-new').classList.toggle('active', t==='new');
    };

    window.checkFirm = () => document.getElementById('firm-box').classList.toggle('hidden', document.getElementById('cust-firm').value.trim() === "");

    onAuthStateChanged(auth, u => { if(u) { document.getElementById('login-section').classList.add('hidden'); document.getElementById('dashboard-section').classList.remove('hidden'); startApp(); } });
    document.getElementById('login-btn').onclick = () => signInWithEmailAndPassword(auth, document.getElementById('login-email').value, document.getElementById('login-password').value);
    document.getElementById('logout-btn').onclick = () => signOut(auth);

    function startApp() {
        onSnapshot(query(collection(db, "objednavky"), orderBy("datum", "desc")), s => {
            allOrders = s.docs.map(d => ({ id: d.id, ...d.data() }));
            renderTable();
        });
    }

    const stlInput = document.getElementById('stl-file');
    document.getElementById('btn-calc-trigger').onclick = () => stlInput.click();
    stlInput.onchange = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        document.getElementById('file-status').innerText = "⏳ Počítám...";
        document.getElementById('file-status').classList.remove('hidden');
        const reader = new FileReader();
        reader.onload = (ev) => {
            const geometry = loader.parse(ev.target.result);
            let vol = 0;
            const pos = geometry.attributes.position.array;
            for (let i = 0; i < pos.length; i += 9) {
                const v1 = new THREE.Vector3(pos[i], pos[i+1], pos[i+2]);
                const v2 = new THREE.Vector3(pos[i+3], pos[i+4], pos[i+5]);
                const v3 = new THREE.Vector3(pos[i+6], pos[i+7], pos[i+8]);
                vol += v1.dot(v2.cross(v3)) / 6.0;
            }
            lastWeight = (Math.abs(vol) / 1000) * 1.25;
            document.getElementById('order-name').value = file.name.replace(".stl", "");
            recalculatePrice();
        };
        reader.readAsArrayBuffer(file);
    };

    window.recalculatePrice = () => {
        if(lastWeight <= 0) return;
        fetch('https://round-feather-938f.bilcusadam.workers.dev/', { method: 'POST', body: JSON.stringify({ vaha: lastWeight }) })
        .then(r => r.json()).then(data => {
            const mat = document.getElementById('order-material').value;
            let p = Math.ceil(data[mat] || (lastWeight * 2.5 + 50));
            document.getElementById('order-price').value = p;
            document.getElementById('file-status').innerText = `✅ Hotovo: ${Math.round(lastWeight)}g`;
        }).catch(() => document.getElementById('order-price').value = Math.ceil(lastWeight * 2.5 + 50));
    };

    document.getElementById('add-btn').onclick = async () => {
        const link = document.getElementById('order-link').value;
        const name = document.getElementById('order-name').value;
        if(!link || !name) return alert("Odkaz a Název jsou povinné!");
        await addDoc(collection(db, "objednavky"), {
            nazev: name, cena: Number(document.getElementById('order-price').value),
            material: document.getElementById('order-material').value,
            barva: document.getElementById('order-color').value, link: link,
            zakaznik: document.getElementById('cust-name').value, firma: document.getElementById('cust-firm').value,
            ico: document.getElementById('cust-ico').value, dic: document.getElementById('cust-dic').value,
            tel: document.getElementById('cust-phone').value, email: document.getElementById('cust-email').value,
            stav: "nová", datum: serverTimestamp()
        });
        location.reload();
    };

    // --- RENDEROVÁNÍ S VYHLEDÁVÁNÍM ---
    window.renderTable = () => {
        const queryStr = document.getElementById('order-search').value.toLowerCase();
        const filtered = allOrders.filter(o => 
            (o.nazev || "").toLowerCase().includes(queryStr) ||
            (o.zakaznik || "").toLowerCase().includes(queryStr) ||
            (o.firma || "").toLowerCase().includes(queryStr) ||
            (o.barva || "").toLowerCase().includes(queryStr)
        );

        document.getElementById('search-count').innerText = `Nalezeno: ${filtered.length} zakázek`;
        document.getElementById('orders-table').innerHTML = filtered.map(o => `
            <tr class="order-row" onclick="openDetail('${o.id}')">
                <td><strong>${o.nazev}</strong></td>
                <td>${o.firma || o.zakaznik || '---'}</td>
                <td>${o.barva || '---'}</td>
                <td>${o.material || '---'}</td>
                <td><span class="pill s-${o.stav}">${o.stav}</span></td>
                <td style="font-weight:800; color:var(--primary);">${o.cena} Kč</td>
            </tr>
        `).join('');
    };

    window.openDetail = (id) => {
        const o = allOrders.find(x => x.id === id);
        currentId = id;
        document.getElementById('edit-nazev').value = o.nazev || "";
        document.getElementById('edit-cena').value = o.cena || 0;
        document.getElementById('edit-barva').value = o.barva || "";
        document.getElementById('edit-zakaznik').value = o.zakaznik || "";
        document.getElementById('edit-firma').value = o.firma || "";
        document.getElementById('edit-tel').value = o.tel || "";
        document.getElementById('edit-email').value = o.email || "";
        document.getElementById('edit-stav').value = o.stav || "nová";
        document.getElementById('modal-link-box').innerHTML = `<a href="${o.link}" target="_blank" style="font-weight:800; color:var(--primary); text-decoration:none;">🔗 OTEVŘÍT MODEL NA WEBU</a>`;
        document.getElementById('detail-modal').classList.remove('hidden');
    };

    window.closeModal = () => document.getElementById('detail-modal').classList.add('hidden');

    document.getElementById('save-edit').onclick = async () => {
        await updateDoc(doc(db, "objednavky", currentId), {
            nazev: document.getElementById('edit-nazev').value, cena: Number(document.getElementById('edit-cena').value),
            barva: document.getElementById('edit-barva').value, zakaznik: document.getElementById('edit-zakaznik').value,
            firma: document.getElementById('edit-firma').value, tel: document.getElementById('edit-tel').value,
            email: document.getElementById('edit-email').value, stav: document.getElementById('edit-stav').value
        });
        closeModal();
    };

    document.getElementById('del-order').onclick = async () => { if(confirm("Smazat?")) { await deleteDoc(doc(db, "objednavky", currentId)); closeModal(); } };
</script>
</body>
</html>
