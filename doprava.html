<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doručení a údaje | 3DCRAFT</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://widget.packeta.com/v6/www/js/library.js"></script>
    
    <style>
        :root { 
            --primary: #6366f1; --bg: #f8fafc; --card: #ffffff; 
            --text: #0f172a; --text-muted: #64748b; --border: #e2e8f0;
        }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); color: var(--text); 
            display: flex; align-items: center; justify-content: center; 
            min-height: 100vh; margin: 0; padding: 20px;
        }
        .card { 
            background: var(--card); padding: 40px; border-radius: 24px; 
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); 
            max-width: 500px; width: 100%;
        }
        h1 { font-weight: 800; margin-bottom: 10px; font-size: 1.5rem; text-align: center; }
        p { color: var(--text-muted); line-height: 1.6; text-align: center; margin-bottom: 25px; }
        
        .form-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 0.9rem; }
        input, select { 
            width: 100%; padding: 12px; border: 1px solid var(--border); 
            border-radius: 10px; box-sizing: border-box; font-family: inherit;
        }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .company-fields { 
            display: none; background: #f1f5f9; padding: 15px; 
            border-radius: 12px; margin-top: 10px; 
        }

        .btn { 
            background: var(--primary); color: white; border: none; 
            padding: 16px 32px; border-radius: 12px; font-weight: 700; 
            cursor: pointer; width: 100%; font-size: 1rem; transition: 0.2s;
            margin-top: 20px;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3); }
        .btn:disabled { background: #cbd5e1; cursor: not-allowed; transform: none; }
        
        #loading-ui { display: flex; flex-direction: column; align-items: center; }
        .spinner { 
            width: 40px; height: 40px; border: 4px solid #f3f3f3; 
            border-top: 4px solid var(--primary); border-radius: 50%; 
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .success-box { text-align: center; }
        .success-icon { font-size: 3rem; color: #10b981; margin-bottom: 15px; }
        .rekap-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="card">
    <div id="loading-ui">
        <div class="spinner"></div>
        <p>Načítám objednávku...</p>
    </div>

    <div id="details-ui" style="display:none;">
        <h1>Vaše údaje</h1>
        <p>Vyplňte prosím doručovací údaje pro vaši poptávku.</p>
        
        <div class="row">
            <div class="form-group">
                <label>Jméno</label>
                <input type="text" id="f-name" placeholder="Jan">
            </div>
            <div class="form-group">
                <label>Příjmení</label>
                <input type="text" id="f-surname" placeholder="Novák">
            </div>
        </div>

        <div class="form-group">
            <label>Ulice a č.p.</label>
            <input type="text" id="f-street" placeholder="Hlavní 123">
        </div>
        
        <div class="row">
            <div class="form-group">
                <label>Město</label>
                <input type="text" id="f-city" placeholder="Praha">
            </div>
            <div class="form-group">
                <label>PSČ</label>
                <input type="text" id="f-zip" placeholder="110 00">
            </div>
        </div>

        <div class="form-group">
            <label>Nákup na firmu?</label>
            <select id="f-is-company" onchange="toggleCompany()">
                <option value="no">Ne, soukromá osoba</option>
                <option value="yes">Ano, nakupuji na firmu</option>
            </select>
        </div>

        <div id="company-box" class="company-fields">
            <div class="form-group">
                <label>IČO (zadejte pro vyhledání)</label>
                <input type="text" id="f-ico" placeholder="Vložte IČO" onblur="fetchAres()">
            </div>
            <div class="form-group">
                <label>Název firmy</label>
                <input type="text" id="f-company-name" readonly style="background:#e2e8f0">
            </div>
            <div class="form-group">
                <label>DIČ (volitelné)</label>
                <input type="text" id="f-dic" placeholder="CZ12345678">
            </div>
        </div>

        <button class="btn" id="btn-next">POKRAČOVAT K DOPRAVĚ</button>
    </div>

    <div id="selection-ui" style="display:none;">
        <h1>Doručení</h1>
        <p>Vyberte výdejní místo Zásilkovny (Packeta).</p>
        <button class="btn" id="btn-pick">VYBRAT VÝDEJNÍ MÍSTO</button>
    </div>

    <div id="done-ui" style="display:none;" class="success-box">
        <div class="success-icon">✅</div>
        <h1>Hotovo!</h1>
        <p>Údaje byly uloženy a objednávka je nyní v procesu.</p>
        <div id="rekapitulace" style="text-align: left; background: #f8fafc; padding: 15px; border-radius: 12px; margin-bottom: 20px;"></div>
        <p style="font-size: 0.8rem; color: #94a3b8;">Údaje jsou nyní uzamčeny proti změnám.</p>
    </div>

    <div id="error-ui" style="display:none; text-align: center;">
        <div style="font-size:3rem; margin-bottom:15px;">❌</div>
        <h1>Chyba</h1>
        <p id="error-text">Odkaz je neplatný.</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBrbJDCJkFm7lD2XOH7-TZmyFRqAUFdQkY",
        authDomain: "dcraft-748f9.firebaseapp.com",
        projectId: "dcraft-748f9",
        appId: "1:761752992060:web:b84c4687cc3dff6afb8639"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const urlParams = new URLSearchParams(window.location.search);
    const orderId = urlParams.get('id');

    // UI Helpers
    const show = (id) => {
        ['loading-ui', 'details-ui', 'selection-ui', 'done-ui', 'error-ui'].forEach(el => 
            document.getElementById(el).style.display = (el === id ? 'block' : 'none')
        );
        if(id === 'loading-ui') document.getElementById(id).style.display = 'flex';
    };

    // ARES API integration
    window.fetchAres = async () => {
        const ico = document.getElementById('f-ico').value.trim();
        if (ico.length < 8) return;
        
        try {
            const response = await fetch(`https://ares.gov.cz/ekonomicke-subjekty-v-be/rest/ekonomicke-subjekty/${ico}`);
            if (response.ok) {
                const data = await response.json();
                document.getElementById('f-company-name').value = data.obchodniJmeno;
                // Volitelně přepsat i adresu
                if (data.sidlo) {
                    document.getElementById('f-street').value = `${data.sidlo.nazevUlice || data.sidlo.nazevObce} ${data.sidlo.cisloDomovni}`;
                    document.getElementById('f-city').value = data.sidlo.nazevObce;
                    document.getElementById('f-zip').value = data.sidlo.psc;
                }
            }
        } catch (e) { console.log("ARES error"); }
    };

    window.toggleCompany = () => {
        const isComp = document.getElementById('f-is-company').value === 'yes';
        document.getElementById('company-box').style.display = isComp ? 'block' : 'none';
    };

    async function init() {
        if (!orderId) { show('error-ui'); return; }
        try {
            await signInAnonymously(auth);
            const snap = await getDoc(doc(db, "objednavky", orderId));
            
            if (snap.exists()) {
                const data = snap.data();
                if (data.status_kompletni === true) {
                    renderRekap(data);
                    show('done-ui');
                } else {
                    show('details-ui');
                }
            } else { show('error-ui'); }
        } catch (e) { show('error-ui'); }
    }

    function renderRekap(data) {
        document.getElementById('rekapitulace').innerHTML = `
            <div class="rekap-row"><span>Jméno:</span> <strong>${data.zakaznik_jmeno}</strong></div>
            <div class="rekap-row"><span>Firma:</span> <strong>${data.firma_nazev || '-'}</strong></div>
            <div class="rekap-row"><span>Adresa:</span> <strong>${data.zakaznik_ulice}, ${data.zakaznik_mesto}</strong></div>
            <div class="rekap-row"><span>Doprava:</span> <strong>${data.shipAddress}</strong></div>
        `;
    }

    // První krok - uložení osobních údajů (dočasně v paměti)
    let tempUserData = {};
    document.getElementById('btn-next').onclick = () => {
        tempUserData = {
            zakaznik_jmeno: document.getElementById('f-name').value + " " + document.getElementById('f-surname').value,
            zakaznik_ulice: document.getElementById('f-street').value,
            zakaznik_mesto: document.getElementById('f-city').value,
            zakaznik_psc: document.getElementById('f-zip').value,
            firma_ico: document.getElementById('f-ico').value,
            firma_nazev: document.getElementById('f-company-name').value,
            firma_dic: document.getElementById('f-dic').value,
            is_firma: document.getElementById('f-is-company').value === 'yes'
        };

        if(!tempUserData.zakaznik_jmeno || !tempUserData.zakaznik_ulice) {
            alert("Prosím vyplňte jméno a adresu."); return;
        }
        show('selection-ui');
    };

    // Druhý krok - Zásilkovna + finální uložení
    document.getElementById('btn-pick').onclick = () => {
        Packeta.Widget.pick("c93547849e77864c", async (point) => {
            if (point) {
                show('loading-ui');
                const fullShip = `Zásilkovna: ${point.name}, ${point.street}, ${point.city}`;
                
                try {
                    const finalData = {
                        ...tempUserData,
                        shipAddress: fullShip,
                        pobocka_id: point.id,
                        status_kompletni: true, // ZÁMEK
                        datum_dokonceni: new Date().toISOString()
                    };

                    await updateDoc(doc(db, "objednavky", orderId), finalData);
                    renderRekap(finalData);
                    show('done-ui');
                } catch (e) {
                    alert("Chyba při ukládání: " + e.message);
                    show('selection-ui');
                }
            }
        }, { country: "cz", language: "cs" });
    };

    init();
</script>

</body>
</html>
