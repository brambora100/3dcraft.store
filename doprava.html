<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Dokončení objednávky | 3DCRAFT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://widget.packeta.com/v6/www/js/library.js"></script>
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --border: #e2e8f0; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 500px; border: 1px solid var(--border); }
        .step { display: none; }
        .step.active { display: block; }
        h2 { margin-top: 0; color: #0f172a; font-weight: 800; }
        input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid var(--border); border-radius: 10px; box-sizing: border-box; font-family: inherit; }
        button { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.2s; font-family: inherit; }
        button:hover { opacity: 0.9; }
        .ship-btn { background: #f1f5f9; color: #475569; margin-bottom: 10px; border: 1px solid var(--border); }
        .ship-btn:hover { background: #e2e8f0; }
        .hidden { display: none; }
        .qr-box { text-align: center; margin-top: 20px; padding: 20px; border: 2px dashed var(--border); border-radius: 20px; background: #fafafa; }
        #ship-info { margin: 15px 0; font-weight: 700; color: var(--primary); text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <div id="step-1" class="step active">
        <h2>👤 Vaše údaje</h2>
        <input type="text" id="c-jmeno" placeholder="Jméno a příjmení">
        <input type="text" id="c-ulice" placeholder="Ulice a č.p.">
        <input type="text" id="c-mesto" placeholder="Město">
        <input type="text" id="c-psc" placeholder="PSČ">
        
        <div style="margin: 10px 0;">
            <label style="font-size: 0.9rem; cursor: pointer;">
                <input type="checkbox" id="c-is-comp" style="width: auto; margin-right: 8px;"> Nakupuji na firmu
            </label>
        </div>
        
        <div id="comp-area" class="hidden">
            <input type="text" id="c-firma" placeholder="Název firmy">
            <input type="text" id="c-ico" placeholder="IČO">
        </div>
        
        <button onclick="goToStep2()">Pokračovat k dopravě</button>
    </div>

    <div id="step-2" class="step">
        <h2>🚚 Doprava</h2>
        <p style="font-size: 0.9rem; color: #64748b;">Vyberte způsob doručení:</p>
        <button class="ship-btn" onclick="pickPacketa()">📦 Vybrat Zásilkovnu (79 Kč)</button>
        <button class="ship-btn" onclick="setShip(129, 'Doručení na adresu')">🏠 Na adresu (129 Kč)</button>
        
        <div id="ship-info">Zatím nevybráno</div>
        
        <button id="confirm-btn" class="hidden" onclick="finishOrder()">Potvrdit a přejít k platbě</button>
        <button onclick="showStep(1)" style="background:none; color:#94a3b8; font-size:0.8rem; margin-top:10px;">← Zpět k údajům</button>
    </div>

    <div id="step-3" class="step">
        <h2 style="text-align:center;">💳 Platba</h2>
        <div class="qr-box">
            <div id="qr-code"></div>
            <h3 id="final-price" style="font-size: 1.8rem; margin: 10px 0;">0 Kč</h3>
            <p style="font-size: 0.9rem; color: #64748b; margin-bottom: 5px;">Účet: <strong>2502263445 / 2010</strong></p>
            <p style="font-size: 0.9rem; color: #64748b;">Variabilní symbol: <strong id="final-vs">---</strong></p>
        </div>
        <p style="text-align:center; margin-top:20px;">
            <a id="invoice-link" href="#" target="_blank" style="color:var(--primary); font-weight:700; text-decoration: none;">📄 Stáhnout fakturu (PDF)</a>
        </p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBrbJDCJkFm7lD2XOH7-TZmyFRqAUFdQkY",
        authDomain: "dcraft-748f9.firebaseapp.com",
        projectId: "dcraft-748f9",
        appId: "1:761752992060:web:b84c4687cc3dff6afb8639"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const workerUrl = "https://test.bilcusadam.workers.dev/";
    
    const urlParams = new URLSearchParams(window.location.search);
    const orderId = urlParams.get('id');
    let orderData = null;
    let shipPrice = 0;
    let shipName = "";

    // Načtení dat hned po startu
    async function init() {
        if (!orderId) {
            alert("Chybí ID objednávky v adrese!");
            return;
        }
        try {
            const snap = await getDoc(doc(db, "objednavky", orderId));
            if (snap.exists()) {
                orderData = snap.data();
                console.log("Data načtena:", orderData);
            } else {
                alert("Objednávka nenalezena!");
            }
        } catch (e) {
            console.error("Chyba Firebase:", e);
        }
    }
    init();

    // Funkce pro přepínání kroků
    window.showStep = (n) => {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step-' + n).classList.add('active');
        window.scrollTo(0,0);
    };

    window.goToStep2 = () => {
        const jmeno = document.getElementById('c-jmeno').value;
        if (jmeno.length < 3) {
            alert("Prosím vyplňte jméno.");
            return;
        }
        window.showStep(2);
    };

    // Firma checkbox
    document.getElementById('c-is-comp').addEventListener('change', (e) => {
        document.getElementById('comp-area').classList.toggle('hidden', !e.target.checked);
    });

    // Zásilkovna
    window.pickPacketa = () => {
        Packeta.Widget.pick("c93547849e77864c", (p) => {
            if (p) {
                shipPrice = 79;
                shipName = "Zásilkovna: " + p.name;
                document.getElementById('ship-info').innerText = shipName + " (79 Kč)";
                document.getElementById('confirm-btn').classList.remove('hidden');
            }
        });
    };

    // Jiná doprava
    window.setShip = (price, name) => {
        shipPrice = price;
        shipName = name;
        document.getElementById('ship-info').innerText = shipName + " (" + price + " Kč)";
        document.getElementById('confirm-btn').classList.remove('hidden');
    };

    // FINÁLNÍ POTVRZENÍ
    window.finishOrder = async () => {
        if (!orderData) return alert("Chyba dat.");
        
        const total = (orderData.cena || 0) + shipPrice;
        // Variabilní symbol vytvoříme z ID objednávky (jen čísla)
        const vs = orderId.replace(/\D/g,'').substring(0,10) || "123456";
        
        try {
            // 1. Update ve Firebase
            await updateDoc(doc(db, "objednavky", orderId), {
                stav: "čeka na platbu",
                cena_celkem: total,
                doprava_info: shipName,
                zakaznik_full: document.getElementById('c-jmeno').value,
                adresa_fakturace: `${document.getElementById('c-ulice').value}, ${document.getElementById('c-mesto').value}, ${document.getElementById('c-psc').value}`
            });

            // 2. Odeslání potvrzovacího e-mailu přes Worker
            fetch(workerUrl, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    action: "send_specific_mail",
                    mailType: "faktura_k_platbe",
                    email: orderData.email,
                    nazev: orderData.nazev,
                    total: total,
                    invoiceUrl: orderData.invoiceUrl
                })
            });

            // 3. Zobrazení výsledku
            document.getElementById('final-price').innerText = total + " Kč";
            document.getElementById('final-vs').innerText = vs;
            document.getElementById('invoice-link').href = orderData.invoiceUrl;
            
            const qrImg = `https://api.paylibo.com/paylibo/generator/czech/image?accountNumber=2502263445&bankCode=2010&amount=${total}&currency=CZK&vs=${vs}`;
            document.getElementById('qr-code').innerHTML = `<img src="${qrImg}" width="220" style="border-radius:10px;">`;
            
            window.showStep(3);
        } catch (e) {
            alert("Chyba při ukládání: " + e.message);
        }
    };
</script>
</body>
</html>
