<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dokončení objednávky | 3DCRAFT</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://widget.packeta.com/v6/www/js/library.js"></script>
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --text: #0f172a; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; padding: 20px; }
        .checkout-card { background: white; padding: 35px; border-radius: 24px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        .step { display: none; }
        .step.active { display: block; }
        h2 { margin-top: 0; font-weight: 800; letter-spacing: -1px; display: flex; align-items: center; gap: 10px; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 12px; margin-bottom: 15px; box-sizing: border-box; font-family: inherit; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .option { border: 2px solid #e2e8f0; padding: 15px; border-radius: 15px; margin-bottom: 10px; cursor: pointer; display: flex; justify-content: space-between; }
        .option.selected { border-color: var(--primary); background: #eef2ff; }
        .summary-box { background: #f1f5f9; padding: 20px; border-radius: 18px; margin: 20px 0; border: 1px dashed #cbd5e1; }
        button { width: 100%; background: var(--primary); color: white; border: none; padding: 16px; border-radius: 14px; font-weight: 800; cursor: pointer; font-size: 1rem; }
        .back-btn { background: none; color: #64748b; text-decoration: underline; margin-top: 10px; padding: 5px; cursor: pointer; border: none; font-weight: 600; }
        .company-fields { display: none; }
    </style>
</head>
<body>

<div class="checkout-card">
    <div id="step-1" class="step active">
        <h2>👤 Vaše údaje</h2>
        <div class="grid">
            <input type="text" id="cust-name" placeholder="Jméno">
            <input type="text" id="cust-surname" placeholder="Příjmení">
        </div>
        <input type="email" id="cust-email" placeholder="E-mail">
        <input type="tel" id="cust-phone" placeholder="Telefon">
        
        <label style="display:flex; align-items:center; gap:8px; margin-bottom:15px; font-weight:600;">
            <input type="checkbox" id="is-company" onchange="toggleCompany()" style="width:auto; margin:0;"> Nakupuji na firmu
        </label>

        <div id="company-area" class="company-fields">
            <input type="text" id="comp-name" placeholder="Název firmy">
            <input type="text" id="comp-ico" placeholder="IČO">
        </div>

        <h3>Fakturační adresa</h3>
        <input type="text" id="addr-street" placeholder="Ulice a č.p.">
        <div class="grid">
            <input type="text" id="addr-city" placeholder="Město">
            <input type="text" id="addr-zip" placeholder="PSČ">
        </div>
        <button onclick="toStep(2)">Pokračovat k dopravě</button>
    </div>

    <div id="step-2" class="step">
        <h2>🚚 Způsob dopravy</h2>
        <div class="option" onclick="selectShip(79, 'Zásilkovna - Výdejní místo', true)">
            <span>📦 Zásilkovna / Balíkovna</span>
            <strong>79 Kč</strong>
        </div>
        <div id="branch-info" style="margin-bottom:10px; color:var(--primary); font-weight:700;"></div>
        
        <div class="option" onclick="selectShip(129, 'Doručení na adresu', false)">
            <span>🏠 Doručení na adresu</span>
            <strong>129 Kč</strong>
        </div>
        <button onclick="toStep(3)" id="btn-to-3" disabled>Rekapitulace objednávky</button>
        <center><button class="back-btn" onclick="toStep(1)">Zpět k údajům</button></center>
    </div>

    <div id="step-3" class="step">
        <h2>✅ Rekapitulace</h2>
        <div class="summary-box" id="final-summary">
            </div>
        <p style="font-size:0.8rem; color:#64748b;">Kliknutím na tlačítko níže potvrdíte objednávku a bude Vám zaslána faktura.</p>
        <button onclick="finishOrder()">POTVRDIT A ZAPLATIT</button>
        <center><button class="back-btn" onclick="toStep(2)">Změnit dopravu/údaje</button></center>
    </div>

    <div id="step-4" class="step" style="text-align:center;">
        <h2>💳 Platba</h2>
        <div id="qr-container"></div>
        <div style="font-size:1.5rem; font-weight:800; color:var(--primary); margin:15px 0;" id="final-total"></div>
        <p>Číslo účtu: <strong>2502263445 / 2010</strong></p>
        <p>Variabilní symbol: <strong id="vs-display"></strong></p>
        <p id="invoice-link-area"></p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { /* TVOJE KONFIGURACE */ };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const urlParams = new URLSearchParams(window.location.search);
    const orderId = urlParams.get('id');

    let orderData = null;
    let shipPrice = 0;
    let shipName = "";
    let branchDetail = "";

    async function init() {
        const docRef = doc(db, "objednavky", orderId);
        const snap = await getDoc(docRef);
        if(snap.exists()) {
            orderData = snap.data();
            // Předvyplnit e-mail pokud ho už máme z adminu
            document.getElementById('cust-email').value = orderData.email || "";
        }
    }

    window.toggleCompany = () => {
        document.getElementById('company-area').style.display = document.getElementById('is-company').checked ? 'block' : 'none';
    };

    window.toStep = (n) => {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step-' + n).classList.add('active');
        if(n === 3) renderSummary();
    };

    window.selectShip = (price, name, isPacketa) => {
        shipPrice = price;
        shipName = name;
        if(isPacketa) {
            Packeta.Widget.pick("c93547849e77864c", (p) => {
                if(p) {
                    branchDetail = p.name + ", " + p.street;
                    document.getElementById('branch-info').innerText = "Vybráno: " + branchDetail;
                    document.getElementById('btn-to-3').disabled = false;
                }
            });
        } else {
            branchDetail = "Doručení na adresu";
            document.getElementById('btn-to-3').disabled = false;
        }
    };

    function renderSummary() {
        const total = orderData.cena + shipPrice;
        let html = `
            <strong>Projekt:</strong> ${orderData.nazev}<br>
            <strong>Zákazník:</strong> ${document.getElementById('cust-name').value} ${document.getElementById('cust-surname').value}<br>
            <strong>Doprava:</strong> ${shipName}<br>
            <hr>
            <strong>Cena tisk:</strong> ${orderData.cena} Kč<br>
            <strong>Doprava:</strong> ${shipPrice} Kč<br>
            <strong style="color:var(--primary); font-size:1.2rem;">Celkem: ${total} Kč</strong>
        `;
        document.getElementById('final-summary').innerHTML = html;
    }

    window.finishOrder = async () => {
        const total = orderData.cena + shipPrice;
        const vs = orderId.replace(/\D/g,'').substring(0,10);
        
        const updates = {
            stav: "čeka na platbu",
            cena_celkem: total,
            zakaznik_full: document.getElementById('cust-name').value + " " + document.getElementById('cust-surname').value,
            adresa_fakturace: `${document.getElementById('addr-street').value}, ${document.getElementById('addr-city').value}`,
            ico: document.getElementById('comp-ico').value || "",
            doprava_info: branchDetail
        };

        await updateDoc(doc(db, "objednavky", orderId), updates);

        // Odeslání e-mailu s fakturou přes Worker
        fetch("https://emailoveakce.bilcusadam.workers.dev/", {
            method: "POST",
            body: JSON.stringify({
                action: "send_specific_mail",
                mailType: "faktura_k_platbe",
                email: document.getElementById('cust-email').value,
                invoiceUrl: orderData.invoiceUrl, // URL nahrané v adminu
                total: total
            })
        });

        // Zobrazení platby
        toStep(4);
        document.getElementById('final-total').innerText = total + " Kč";
        document.getElementById('vs-display').innerText = vs;
        const qrUrl = `https://api.paylibo.com/paylibo/generator/czech/image?accountNumber=2502263445&bankCode=2010&amount=${total}&currency=CZK&vs=${vs}`;
        document.getElementById('qr-container').innerHTML = `<img src="${qrUrl}" width="250">`;
        if(orderData.invoiceUrl) {
            document.getElementById('invoice-link-area').innerHTML = `<a href="${orderData.invoiceUrl}" target="_blank">📄 Stáhnout fakturu (PDF)</a>`;
        }
    };

    init();
</script>
</body>
</html>
