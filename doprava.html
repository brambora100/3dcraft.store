<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Výběr Zásilkovny | 3DCRAFT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://widget.packeta.com/v6/www/js/library.js"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 24px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.3); max-width: 380px; width: 90%; }
        .btn { background: #6366f1; color: white; border: none; padding: 18px 25px; border-radius: 12px; font-weight: 800; cursor: pointer; width: 100%; transition: 0.3s; font-size: 16px; text-transform: uppercase; letter-spacing: 1px; }
        .btn:hover { background: #4f46e5; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3); }
        #status { margin-top: 25px; font-size: 15px; color: #64748b; line-height: 1.6; }
        .logo { font-size: 28px; font-weight: 800; margin-bottom: 10px; color: #1e1b4b; }
        .logo span { color: #6366f1; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">3D<span>CRAFT</span></div>
        <p style="color:#64748b; margin-bottom: 30px; font-weight: 500;">Vyberte si prosím výdejní místo Zásilkovny pro doručení Vašeho modelu.</p>
        <button id="main-btn" class="btn" onclick="openMap()">📍 Otevřít mapu poboček</button>
        <div id="status"></div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBrbJDCJkFm7lD2XOH7-TZmyFRqAUFdQkY",
        authDomain: "dcraft-748f9.firebaseapp.com",
        projectId: "dcraft-748f9",
        appId: "1:761752992060:web:b84c4687cc3dff6afb8639"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const orderId = new URLSearchParams(window.location.search).get('id');

    window.openMap = () => {
        if (!orderId) { alert("Chybí ID zakázky."); return; }

        Packeta.Widget.pick("c93547849e77864c", async (point) => {
            if (point) {
                const statusDiv = document.getElementById('status');
                const mainBtn = document.getElementById('main-btn');
                
                statusDiv.innerHTML = "⌛ <b>Ukládám výběr...</b>";
                mainBtn.style.display = 'none';

                try {
                    // Aktualizujeme data v Firebase u té konkrétní objednávky
                    await updateDoc(doc(db, "objednavky", orderId), {
                        pobocka: point.name,
                        pobocka_adresa: point.street + ", " + point.city,
                        stav: "doprava_vybrana" 
                    });
                    
                    statusDiv.innerHTML = `<div style="color:#22c55e; font-weight:800; font-size:18px; margin-top:10px;">✅ ÚSPĚŠNĚ ULOŽENO!</div>
                        <div style="margin-top:10px;">Pobočka: <b>${point.name}</b><br>Nyní můžete toto okno zavřít a odpovědět na e-mail.</div>`;
                } catch (e) {
                    statusDiv.innerHTML = `<div style="color:#ef4444;">❌ Chyba: ${e.message}</div>`;
                    mainBtn.style.display = 'block';
                }
            }
        }, { country: "cz" });
    };
</script>
</body>
</html>
