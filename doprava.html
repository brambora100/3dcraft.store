<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Doprava a platba | 3DCRAFT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --text: #0f172a; --border: #e2e8f0; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); padding: 10px; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: white; padding: 40px; border-radius: 28px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); width: 100%; max-width: 550px; border: 1px solid var(--border); box-sizing: border-box; }
        .step { display: none; }
        .step.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        h2 { margin-top: 0; font-weight: 800; font-size: 1.8rem; text-align: center; }
        .subtitle { text-align: center; color: #64748b; margin-bottom: 30px; font-size: 0.9rem; }
        input { width: 100%; padding: 14px; margin-bottom: 20px; border: 1px solid var(--border); border-radius: 12px; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; background: var(--primary); color: white; border: none; padding: 18px; border-radius: 16px; font-weight: 800; cursor: pointer; transition: 0.3s; font-size: 1rem; }
        .ship-btn { background: #fff; color: #475569; margin-bottom: 12px; border: 2px solid var(--border); text-align: left; padding: 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border-radius: 16px; }
        .ship-btn:hover { border-color: var(--primary); background: #f5f7ff; }
        .ship-btn.selected { border-color: var(--primary); background: #f5f7ff; box-shadow: 0 0 0 2px var(--primary); }
        #ship-info { margin: 20px 0; padding: 15px; border-radius: 14px; background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; font-weight: 600; text-align: center; display: none; }
        #balikovna-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background: white; z-index: 9999; }
        #balikovna-iframe { width:100%; height:100%; border:none; }
        .close-x { position: absolute; top: 15px; right: 20px; font-size: 35px; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="balikovna-modal">
    <div class="close-x" onclick="closeBalikovna()">&times;</div>
    <iframe id="balikovna-iframe" allow="geolocation" src="https://b2c.cpost.cz/locations/?type=BALIKOVNY&phone=false"></iframe>
</div>

<div class="card">
    <div id="step-1" class="step active">
        <h2>👤 Vaše údaje</h2>
        <p class="subtitle">Vyplňte doručovací a fakturační údaje</p>
        <input type="text" id="c-jmeno" placeholder="Jméno a příjmení">
        <input type="text" id="c-ulice" placeholder="Ulice a č.p.">
        <div style="display:grid; grid-template-columns: 2fr 1fr; gap:15px;">
            <input type="text" id="c-mesto" placeholder="Město">
            <input type="text" id="c-psc" placeholder="PSČ">
        </div>
        <button onclick="goToStep2()">Pokračovat k dopravě</button>
    </div>

    <div id="step-2" class="step">
        <h2>🚚 Doprava</h2>
        <p class="subtitle">Vyberte způsob doručení</p>
        <div class="ship-btn" onclick="openBalikovna()" id="btn-balikovna">
            <span><strong>📦 Balíkovna</strong><br><small>Výdejní místo</small></span>
            <strong>75 Kč</strong>
        </div>
        <div class="ship-btn" onclick="setShip(105, 'Doručení na adresu')" id="btn-adresa">
            <span><strong>🏠 Na adresu</strong><br><small>Kurýr až domů</small></span>
            <strong>105 Kč</strong>
        </div>
        <div id="ship-info"></div>
        <button id="confirm-btn" class="hidden" onclick="finishOrder()">DOKONČIT A ULOŽIT</button>
        <button onclick="showStep(1)" style="background:none; color:#94a3b8; font-size:0.8rem; margin-top:15px;">← ZPĚT</button>
    </div>

    <div id="step-3" class="step" style="text-align: center;">
        <span style="font-size:5rem">✅</span>
        <h2>Hotovo!</h2>
        <p>Vaše údaje a doprava byly uloženy. <br>V administraci se nyní zobrazí celková cena.</p>
        <button onclick="window.close()" style="background:#f1f5f9; color:#0f172a; margin-top:30px;">ZAVŘÍT</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBrbJDCJkFm7lD2XOH7-TZmyFRqAUFdQkY",
        authDomain: "dcraft-748f9.firebaseapp.com",
        projectId: "dcraft-748f9",
        appId: "1:761752992060:web:b84c4687cc3dff6afb8639"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const orderId = new URLSearchParams(window.location.search).get('id');
    let orderData = null;
    let shipPrice = 0;
    let shipName = "";

    async function loadOrder() {
        if (!orderId) return alert("Chybí ID objednávky!");
        const snap = await getDoc(doc(db, "objednavky", orderId));
        if (snap.exists()) orderData = snap.data();
    }
    loadOrder();

    window.addEventListener("message", (e) => {
        if (e.data.message === "pickerResult") {
            const p = e.data.point;
            setShip(75, `Balíkovna: ${p.name} (${p.address})`);
            closeBalikovna();
        }
    });

    window.openBalikovna = () => { document.getElementById('balikovna-modal').style.display='block'; };
    window.closeBalikovna = () => { document.getElementById('balikovna-modal').style.display='none'; };
    window.showStep = (n) => { document.querySelectorAll('.step').forEach(s=>s.classList.remove('active')); document.getElementById('step-'+n).classList.add('active'); };

    window.goToStep2 = () => {
        if (!document.getElementById('c-jmeno').value) return alert("Vyplňte jméno.");
        window.showStep(2);
    };

    window.setShip = (price, name) => {
        shipPrice = price; shipName = name;
        document.getElementById('ship-info').style.display = 'block';
        document.getElementById('ship-info').innerText = "Vybráno: " + shipName;
        document.getElementById('confirm-btn').classList.remove('hidden');
        document.querySelectorAll('.ship-btn').forEach(b => b.classList.remove('selected'));
        if(price === 105) document.getElementById('btn-adresa').classList.add('selected');
    };

    window.finishOrder = async () => {
        const basePrice = Number(orderData.cena) || 0;
        const finalTotal = basePrice + shipPrice;
        
        try {
            await updateDoc(doc(db, "objednavky", orderId), {
                cena: finalTotal,              // Celková cena včetně dopravy
                doprava_cena: shipPrice,       // Uložíme cenu dopravy samostatně pro Worker
                shipAddress: shipName,         // Adresa doručení
                zakaznik: document.getElementById('c-jmeno').value,
                fakturacniAdresa: `${document.getElementById('c-ulice').value}, ${document.getElementById('c-mesto').value}, ${document.getElementById('c-psc').value}`,
                stav: "čeká na platbu"
            });
            window.showStep(3);
        } catch (e) { alert("Chyba při ukládání."); }
    };
</script>
</body>
</html>
