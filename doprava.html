<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doručení a fakturace | 3DCRAFT</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://widget.packeta.com/v6/www/js/library.js"></script>
    
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --border: #e2e8f0; --success: #10b981; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: var(--card); padding: 40px; border-radius: 24px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); max-width: 500px; width: 100%; }
        h1 { font-weight: 800; margin-bottom: 10px; font-size: 1.5rem; text-align: center; }
        p { color: #64748b; line-height: 1.6; text-align: center; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 0.85rem; color: #475569; }
        input, select { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px; box-sizing: border-box; font-family: inherit; font-size: 0.95rem; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .company-fields { display: none; background: #f1f5f9; padding: 15px; border-radius: 12px; margin-top: 10px; border: 1px solid #e2e8f0; }
        .btn { background: var(--primary); color: white; border: none; padding: 16px 32px; border-radius: 12px; font-weight: 700; cursor: pointer; width: 100%; font-size: 1rem; transition: 0.2s; margin-top: 20px; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3); }
        .btn-secondary { background: transparent; color: #64748b; border: 1px solid var(--border); padding: 10px; margin-top: 10px; font-size: 0.8rem; }
        
        #loading-ui { display: none; flex-direction: column; align-items: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .rekap-box { text-align: left; background: #f8fafc; padding: 20px; border-radius: 16px; border: 1px solid #e2e8f0; margin-top: 10px; }
        .rekap-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; }
        .rekap-row:last-child { border: none; }
        .tag { background: var(--primary); color: white; padding: 2px 8px; border-radius: 6px; font-size: 0.75rem; }
    </style>
</head>
<body>

<div class="card">
    <div id="loading-ui"><div class="spinner"></div><p>Ukládám data do systému...</p></div>

    <div id="details-ui">
        <h1>Kontaktní údaje</h1>
        <p>Zadejte údaje, kam vám balíček zašleme a na koho vystavíme fakturu.</p>
        
        <div class="row">
            <div class="form-group"><label>Jméno</label><input type="text" id="f-name" placeholder="Jan"></div>
            <div class="form-group"><label>Příjmení</label><input type="text" id="f-surname" placeholder="Novák"></div>
        </div>
        
        <div class="form-group"><label>Telefon (pro dopravce)</label><input type="tel" id="f-phone" placeholder="+420 777 123 456"></div>
        <div class="form-group"><label>Ulice a č.p.</label><input type="text" id="f-street" placeholder="Vodičkova 123/1"></div>
        
        <div class="row">
            <div class="form-group"><label>Město</label><input type="text" id="f-city" placeholder="Praha"></div>
            <div class="form-group"><label>PSČ</label><input type="text" id="f-zip" placeholder="110 00"></div>
        </div>

        <div class="form-group">
            <label>Typ nákupu</label>
            <select id="f-is-company" onchange="toggleCompany()">
                <option value="no">Soukromá osoba</option>
                <option value="yes">Firma / Živnostník</option>
            </select>
        </div>

        <div id="company-box" class="company-fields">
            <div class="form-group"><label>IČO</label><input type="text" id="f-ico" placeholder="Zadejte IČO" onblur="fetchAres()"></div>
            <div class="form-group"><label>Název firmy</label><input type="text" id="f-company-name" readonly style="background:#e2e8f0;"></div>
            <div class="form-group"><label>DIČ (nepovinné)</label><input type="text" id="f-dic" placeholder="CZ12345678"></div>
        </div>

        <button class="btn" id="btn-to-transport">VYBRAT DOPRAVU ZÁSILKOVNY</button>
    </div>

    <div id="confirm-ui" style="display:none; text-align: center;">
        <h1>Shrnutí objednávky</h1>
        <p>Zkontrolujte si prosím zadané údaje před finálním potvrzením.</p>
        
        <div id="rekap-preview" class="rekap-box"></div>

        <button class="btn" id="btn-final-confirm" style="background: var(--success);">ZÁVAZNĚ POTVRDIT A DOKONČIT</button>
        <button class="btn btn-secondary" onclick="location.reload()">UPRAVIT ÚDAJE</button>
    </div>

    <div id="done-ui" style="display:none; text-align: center;">
        <div style="font-size: 3rem; color: #10b981; margin-bottom: 15px;">✅</div>
        <h1>Hotovo!</h1>
        <p>Vaše údaje byly v pořádku spárovány s objednávkou.</p>
        <div id="rekapitulace-final" class="rekap-box"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBrbJDCJkFm7lD2XOH7-TZmyFRqAUFdQkY",
        authDomain: "dcraft-748f9.firebaseapp.com",
        projectId: "dcraft-748f9",
        appId: "1:761752992060:web:b84c4687cc3dff6afb8639"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const urlParams = new URLSearchParams(window.location.search);
    const orderId = urlParams.get('id');

    let temporaryData = null; // Zde uložíme data než je uživatel potvrdí

    window.toggleCompany = () => {
        document.getElementById('company-box').style.display = document.getElementById('f-is-company').value === 'yes' ? 'block' : 'none';
    };

    window.fetchAres = async () => {
        const ico = document.getElementById('f-ico').value.trim();
        if (ico.length < 8) return;
        try {
            const res = await fetch(`https://ares.gov.cz/ekonomicke-subjekty-v-be/rest/ekonomicke-subjekty/${ico}`);
            if (res.ok) {
                const d = await res.json();
                document.getElementById('f-company-name').value = d.obchodniJmeno;
            }
        } catch (e) {}
    };

    async function init() {
        if (!orderId) return;
        try {
            await signInAnonymously(auth);
            const snap = await getDoc(doc(db, "objednavky", orderId));
            if (snap.exists() && snap.data().status_kompletni) {
                renderRekap(snap.data(), 'rekapitulace-final');
                document.getElementById('details-ui').style.display = 'none';
                document.getElementById('done-ui').style.display = 'block';
            }
        } catch (e) {}
    }

    function renderRekap(data, targetId) {
        document.getElementById(targetId).innerHTML = `
            <div class="rekap-row"><span>Příjemce:</span> <strong>${data.zakaznik_jmeno}</strong></div>
            <div class="rekap-row"><span>Telefon:</span> <strong>${data.zakaznik_tel}</strong></div>
            <div class="rekap-row"><span>Fakturace:</span> <strong>${data.zakaznik_ulice}, ${data.zakaznik_mesto}</strong></div>
            ${data.firma_nazev ? `<div class="rekap-row"><span>Firma:</span> <strong>${data.firma_nazev} (IČ: ${data.firma_ico})</strong></div>` : ''}
            <div class="rekap-row"><span>Doprava:</span> <strong style="color:var(--primary)">${data.shipAddress}</strong></div>
        `;
    }

    // KROK 1: Výběr dopravy a příprava shrnutí
    document.getElementById('btn-to-transport').onclick = () => {
        const fields = {
            name: document.getElementById('f-name').value,
            surname: document.getElementById('f-surname').value,
            phone: document.getElementById('f-phone').value,
            street: document.getElementById('f-street').value,
            city: document.getElementById('f-city').value,
            zip: document.getElementById('f-zip').value
        };

        if (!fields.name || !fields.surname || !fields.phone || !fields.street || !fields.city) {
            alert("Prosím vyplňte všechna pole včetně telefonu."); return;
        }

        Packeta.Widget.pick("c93547849e77864c", async (point) => {
            if (point) {
                // Připravíme si data pro finální uložení
                temporaryData = {
                    zakaznik_jmeno: `${fields.name} ${fields.surname}`,
                    zakaznik_tel: fields.phone,
                    zakaznik_ulice: fields.street,
                    zakaznik_mesto: fields.city,
                    zakaznik_psc: fields.zip,
                    firma_nazev: document.getElementById('f-company-name').value || "",
                    firma_ico: document.getElementById('f-ico').value || "",
                    firma_dic: document.getElementById('f-dic').value || "",
                    shipAddress: `Zásilkovna: ${point.name}, ${point.street}, ${point.city}`,
                    pobocka_id: point.id,
                    status_kompletni: true,
                    datum_dokonceni: new Date().toISOString()
                };

                // Zobrazíme UI se shrnutím
                document.getElementById('details-ui').style.display = 'none';
                document.getElementById('confirm-ui').style.display = 'block';
                renderRekap(temporaryData, 'rekap-preview');
            }
        }, { country: "cz", language: "cs" });
    };

    // KROK 2: Finální potvrzení a zápis do DB
    document.getElementById('btn-final-confirm').onclick = async () => {
        if (!temporaryData) return;

        document.getElementById('confirm-ui').style.display = 'none';
        document.getElementById('loading-ui').style.display = 'flex';

        try {
            await updateDoc(doc(db, "objednavky", orderId), temporaryData);
            renderRekap(temporaryData, 'rekapitulace-final');
            document.getElementById('loading-ui').style.display = 'none';
            document.getElementById('done-ui').style.display = 'block';
        } catch (e) {
            alert("Chyba při ukládání: " + e.message);
            document.getElementById('loading-ui').style.display = 'none';
            document.getElementById('confirm-ui').style.display = 'block';
        }
    };

    init();
</script>
</body>
</html>
