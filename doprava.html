<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Výběr Zásilkovny | 3DCRAFT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://widget.packeta.com/v6/www/js/library.js"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 24px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.3); max-width: 400px; width: 90%; }
        .btn { background: #6366f1; color: white; border: none; padding: 18px 25px; border-radius: 12px; font-weight: 800; cursor: pointer; width: 100%; transition: 0.3s; font-size: 16px; text-transform: uppercase; }
        .btn:hover { background: #4f46e5; transform: translateY(-3px); }
        #status { margin-top: 25px; font-size: 15px; color: #64748b; line-height: 1.6; }
        .warning { color: #e11d48; font-size: 13px; margin-top: 15px; font-weight: 600; display: block; }
        .logo { font-size: 28px; font-weight: 800; margin-bottom: 10px; color: #1e1b4b; }
        .logo span { color: #6366f1; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #6366f1; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">3D<span>CRAFT</span></div>
        <div id="loading-spinner" class="loader"></div>
        
        <div id="content-area" style="display:none;">
            <p style="color:#64748b; margin-bottom: 20px; font-weight: 500;">Vyberte si prosím výdejní místo Zásilkovny pro vaši objednávku.</p>
            <button id="main-btn" class="btn">📍 Otevřít mapu poboček</button>
            <small id="warn-text" class="warning">⚠️ Pozor: Výběr je finální a nelze jej změnit!</small>
        </div>
        
        <div id="status"></div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBrbJDCJkFm7lD2XOH7-TZmyFRqAUFdQkY",
        authDomain: "dcraft-748f9.firebaseapp.com",
        projectId: "dcraft-748f9",
        appId: "1:761752992060:web:b84c4687cc3dff6afb8639"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    // Získání ID z URL
    const urlParams = new URLSearchParams(window.location.search);
    const orderId = urlParams.get('id');
    
    const statusDiv = document.getElementById('status');
    const contentArea = document.getElementById('content-area');
    const loadingSpinner = document.getElementById('loading-spinner');
    const mainBtn = document.getElementById('main-btn');

    async function checkOrder() {
        if (!orderId) {
            loadingSpinner.style.display = 'none';
            statusDiv.innerHTML = "❌ Neplatný nebo chybějící odkaz na objednávku.";
            return;
        }

        try {
            const docRef = doc(db, "objednavky", orderId);
            const docSnap = await getDoc(docRef);

            loadingSpinner.style.display = 'none';

            if (docSnap.exists()) {
                const data = docSnap.data();
                
                // Pokud už pobočka v databázi je (pole existuje a není prázdné)
                if (data.pobocka && data.pobocka.trim() !== "") {
                    statusDiv.innerHTML = `
                        <div style="color:#22c55e; font-weight:800; font-size:18px;">✅ JIŽ VYBRÁNO</div>
                        <p style="margin-top:10px;">Vaše doručení je nastaveno na:<br><b>${data.pobocka}</b></p>
                        <p style="font-size:12px; color:#64748b;">Místo již nelze změnit. Pokud potřebujete změnu, kontaktujte nás.</p>
                    `;
                } else {
                    contentArea.style.display = 'block';
                }
            } else {
                statusDiv.innerHTML = "❌ Objednávka nebyla v našem systému nalezena.";
            }
        } catch (error) {
            console.error("Firebase Error:", error);
            loadingSpinner.style.display = 'none';
            statusDiv.innerHTML = "❌ Chyba při komunikaci s databází.<br><small>Zkontrolujte prosím připojení nebo oprávnění.</small>";
        }
    }

    // Funkce pro otevření mapy
    function openMap() {
        Packeta.Widget.pick("c93547849e77864c", async (point) => {
            if (point) {
                const confirmChoice = confirm(`Opravdu si přejete doručit model na: ${point.name}?\n\nTento výběr je trvalý.`);
                
                if (!confirmChoice) return;

                contentArea.style.display = 'none';
                loadingSpinner.style.display = 'block';

                try {
                    await updateDoc(doc(db, "objednavky", orderId), {
                        pobocka: point.name,
                        pobocka_adresa: point.street + ", " + point.city,
                        stav: "doprava_vybrana" 
                    });
                    
                    loadingSpinner.style.display = 'none';
                    statusDiv.innerHTML = `
                        <div style="color:#22c55e; font-weight:800; font-size:18px;">✅ ÚSPĚŠNĚ ULOŽENO</div>
                        <p style="margin-top:10px;">Pobočka <b>${point.name}</b> byla úspěšně uložena.</p>
                        <p>Brzy vás budeme informovat o dalším postupu.</p>
                    `;
                } catch (e) {
                    console.error("Update Error:", e);
                    loadingSpinner.style.display = 'none';
                    contentArea.style.display = 'block';
                    alert("Chyba při ukládání pobočky: " + e.message);
                }
            }
        }, { country: "cz" });
    }

    // Přiřazení eventu tlačítku (bezpečnější než onclick v HTML u modulů)
    mainBtn.addEventListener('click', openMap);

    // Spuštění kontroly
    checkOrder();
</script>
</body>
</html>
