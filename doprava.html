<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Výběr Zásilkovny | 3DCRAFT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">
    <script src="https://widget.packeta.com/v6/www/js/library.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --text-main: #1e1b4b;
            --text-sub: #64748b;
            --success: #22c55e;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
        }

        .card { 
            background: white; 
            padding: 40px; 
            border-radius: 32px; 
            text-align: center; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); 
            max-width: 420px; 
            width: 100%; 
            box-sizing: border-box;
        }

        .logo { 
            font-size: 24px; 
            font-weight: 900; 
            margin-bottom: 30px; 
            color: var(--text-main); 
            letter-spacing: 2px;
        }

        .logo span { color: var(--primary); }

        /* Kontejnery pro stavy */
        #loading-area, #selection-area, #success-area, #error-area {
            display: none;
        }

        .btn { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 18px 25px; 
            border-radius: 16px; 
            font-weight: 800; 
            cursor: pointer; 
            width: 100%; 
            transition: all 0.3s ease; 
            font-size: 15px; 
            text-transform: uppercase;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }

        .btn:hover { 
            background: #4f46e5; 
            transform: translateY(-2px);
            box-shadow: 0 15px 20px -3px rgba(99, 102, 241, 0.4);
        }

        .status-title {
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 12px;
            display: block;
        }

        .info-text {
            color: var(--text-sub);
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .warning-box {
            background: #fff1f2;
            color: #e11d48;
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            margin-top: 20px;
        }

        .pobocka-detail {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 16px;
            border-radius: 16px;
            margin: 15px 0;
            font-weight: 700;
            color: var(--text-main);
        }

        /* Loader */
        .loader { 
            border: 4px solid #f3f3f3; 
            border-top: 4px solid var(--primary); 
            border-radius: 50%; 
            width: 40px; 
            height: 40px; 
            animation: spin 1s linear infinite; 
            margin: 20px auto; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo">3D<span>CRAFT</span></div>

        <div id="loading-area">
            <div class="loader"></div>
            <p class="info-text">Prověřuji vaši objednávku...</p>
        </div>

        <div id="selection-area">
            <p class="info-text">Vyberte si prosím výdejní místo Zásilkovny pro doručení vašeho modelu.</p>
            <button id="open-map-btn" class="btn">📍 Otevřít mapu poboček</button>
            <div class="warning-box">⚠️ Výběr je finální a nelze jej změnit.</div>
        </div>

        <div id="success-area">
            <span class="status-title" style="color: var(--success);">✅ JIŽ VYBRÁNO</span>
            <p class="info-text">Doručení je nastaveno na:</p>
            <div id="selected-pobocka-name" class="pobocka-detail">---</div>
            <p class="info-text" style="font-size: 13px;">Místo již nelze změnit. Pokud potřebujete provést změnu, kontaktujte nás na info@3dcraft.cz</p>
        </div>

        <div id="error-area">
            <span class="status-title" style="color: #e11d48;">❌ CHYBA</span>
            <p id="error-message" class="info-text"></p>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBrbJDCJkFm7lD2XOH7-TZmyFRqAUFdQkY",
        authDomain: "dcraft-748f9.firebaseapp.com",
        projectId: "dcraft-748f9",
        appId: "1:761752992060:web:b84c4687cc3dff6afb8639"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    const urlParams = new URLSearchParams(window.location.search);
    const orderId = urlParams.get('id');

    const areas = {
        loading: document.getElementById('loading-area'),
        selection: document.getElementById('selection-area'),
        success: document.getElementById('success-area'),
        error: document.getElementById('error-area')
    };

    function showArea(name) {
        Object.keys(areas).forEach(key => {
            areas[key].style.display = (key === name) ? 'block' : 'none';
        });
    }

    async function checkOrder() {
        if (!orderId) {
            showArea('error');
            document.getElementById('error-message').innerText = "Chybí identifikační číslo objednávky.";
            return;
        }

        showArea('loading');

        try {
            const docRef = doc(db, "objednavky", orderId);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                const data = docSnap.data();
                if (data.pobocka && data.pobocka.trim() !== "") {
                    document.getElementById('selected-pobocka-name').innerText = data.pobocka;
                    showArea('success');
                } else {
                    showArea('selection');
                }
            } else {
                showArea('error');
                document.getElementById('error-message').innerText = "Objednávka nebyla nalezena.";
            }
        } catch (error) {
            showArea('error');
            document.getElementById('error-message').innerText = "Chyba při načítání dat z databáze.";
        }
    }

    async function openMap() {
        Packeta.Widget.pick("c93547849e77864c", async (point) => {
            if (point) {
                const confirmChoice = confirm(`Potvrdit výběr?\n\nPobočka: ${point.name}\nAdresa: ${point.street}, ${point.city}`);
                if (!confirmChoice) return;

                showArea('loading');

                try {
                    await updateDoc(doc(db, "objednavky", orderId), {
                        pobocka: point.name,
                        pobocka_adresa: point.street + ", " + point.city,
                        stav: "doprava_vybrana" 
                    });
                    
                    document.getElementById('selected-pobocka-name').innerText = point.name;
                    showArea('success');
                } catch (e) {
                    showArea('selection');
                    alert("Chyba při ukládání: " + e.message);
                }
            }
        }, { country: "cz" });
    }

    document.getElementById('open-map-btn').addEventListener('click', openMap);
    checkOrder();
</script>
</body>
</html>
