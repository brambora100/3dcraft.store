<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulačka | 3DCRAFT.STORE</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/STLLoader.js"></script>

    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --bg-body: #ffffff;
            --bg-soft: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { background-color: var(--bg-body); color: var(--text-main); overflow-x: hidden; }

        /* --- PŘESNĚ OPSANÉ CSS NAVIGACE --- */
        header { 
            position: fixed; top: 20px; left: 0; right: 0; 
            display: flex; justify-content: center; z-index: 1000; padding: 0 20px; 
        }

        nav { 
            background: rgba(255, 255, 255, 0.8); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 10px 14px; border-radius: 24px; 
            display: flex; align-items: center; 
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            width: fit-content;
        }

        .nav-logo { padding: 0 15px; text-decoration: none; font-weight: 800; color: var(--text-main); font-size: 1.1rem; }
        .nav-logo span { color: var(--primary); }

        .nav-group { display: flex; gap: 4px; align-items: center; }
        
        .nav-link { 
            color: var(--text-muted); 
            text-decoration: none; font-size: 0.85rem; font-weight: 700; 
            padding: 10px 16px; border-radius: 14px; 
            transition: 0.3s; 
        }
        .nav-link:hover { color: var(--primary); background: var(--bg-soft); }
        .nav-link.active { background: var(--primary); color: white; }

        .btn-poptavka { 
            background: var(--primary); color: white; 
            padding: 10px 22px; border-radius: 14px; 
            text-decoration: none; font-size: 0.85rem; font-weight: 800;
            margin-left: 8px; transition: 0.3s;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2);
        }
        .btn-poptavka:hover { transform: translateY(-1px); background: var(--primary-hover); box-shadow: 0 6px 20px rgba(79, 70, 229, 0.3); }

        .nav-sep { width: 1px; height: 24px; background: rgba(0, 0, 0, 0.1); margin: 0 12px; }

        /* --- ZBYTEK STRÁNKY --- */
        .hero { height: 40vh; display: flex; align-items: center; justify-content: center; text-align: center; padding-top: 80px; background: #f8fafc; }
        .hero h1 { font-size: 3rem; font-weight: 800; }
        .hero h1 span { color: var(--primary); }

        .calc-section { padding: 60px 0; }
        .container { max-width: 1000px; margin: 0 auto; padding: 0 20px; }
        .calc-card { background: white; border-radius: 30px; display: grid; grid-template-columns: 1fr 1fr; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.05); border: 1px solid #f1f5f9; }
        .form-left { padding: 40px; }
        .form-right { background: #0f172a; padding: 40px; color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .price-display { font-size: 4rem; font-weight: 800; color: #818cf8; }
        
        .drop-zone { border: 2px dashed #cbd5e1; padding: 40px; text-align: center; border-radius: 20px; cursor: pointer; margin: 20px 0; }
        select { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #ddd; margin-top: 10px; }
    </style>
</head>
<body>

    <header>
        <nav>
            <a href="/3dcraft.store/" class="nav-logo">3DCRAFT<span>.STORE</span></a>
            <div class="nav-group">
                <div class="nav-sep"></div>
                <a href="/3dcraft.store/" class="nav-link">Domů</a>
                <a href="/3dcraft.store/produkty" class="nav-link">Produkty</a>
                <a href="/3dcraft.store/kalkulacka" class="nav-link active">Kalkulačka</a>
                <a href="/3dcraft.store/kontakt" class="nav-link">Kontakt</a>
                <div class="nav-sep"></div>
                <a href="/3dcraft.store/poptavka" class="btn-poptavka">Nezávazná Poptávka</a>
            </div>
        </nav>
    </header>

    <section class="hero">
        <div>
            <h1>Cenová <span>Kalkulačka</span></h1>
            <p>Nahrajte svůj model a zjistěte cenu během vteřiny.</p>
        </div>
    </section>

    <main class="calc-section">
        <div class="container">
            <div class="calc-card">
                <div class="form-left">
                    <label>Nahrajte model (.STL)</label>
                    <div class="drop-zone" id="drop-zone">
                        <p id="file-name">Klikněte nebo přetáhněte soubor</p>
                        <input type="file" id="stl-input" accept=".stl" style="display: none;">
                    </div>
                    <label>Materiál</label>
                    <select id="material-select">
                        <option value="PLA">PLA</option>
                        <option value="PETG">PETG</option>
                        <option value="ASA">ASA</option>
                    </select>
                </div>
                <div class="form-right">
                    <div style="opacity: 0.7; text-transform: uppercase; font-size: 0.8rem;">Odhad ceny</div>
                    <div class="price-display" id="total-price">0<span style="font-size: 1.5rem; color: white;"> Kč</span></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const fileInput = document.getElementById('stl-input');
        const dropZone = document.getElementById('drop-zone');
        const priceDisplay = document.getElementById('total-price');
        const loader = new THREE.STLLoader();

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            document.getElementById('file-name').innerText = file.name;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const geometry = loader.parse(ev.target.result);
                let volume = 0;
                const pos = geometry.attributes.position.array;
                for (let i = 0; i < pos.length; i += 9) {
                    const v1 = new THREE.Vector3(pos[i], pos[i+1], pos[i+2]);
                    const v2 = new THREE.Vector3(pos[i+3], pos[i+4], pos[i+5]);
                    const v3 = new THREE.Vector3(pos[i+6], pos[i+7], pos[i+8]);
                    volume += v1.dot(v2.cross(v3)) / 6.0;
                }
                const vaha = (Math.abs(volume) / 1000) * 1.25;
                fetch('https://round-feather-938f.bilcusadam.workers.dev/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ vaha: vaha })
                })
                .then(res => res.json())
                .then(data => {
                    priceDisplay.innerHTML = `${data[document.getElementById('material-select').value]}<span style="font-size: 1.5rem; color: white;"> Kč</span>`;
                });
            };
            reader.readAsArrayBuffer(file);
        };
    </script>
</body>
</html>
